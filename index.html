<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Copiar código</title>
    <style>
      pre {
        background-color: #272822; /* Cor de fundo do bloco de código */
        color: #F8F8F2; /* Cor do texto dentro do bloco de código */
        padding: 1em;
        position: relative;
      }
      pre::before {
        content: 'Código';
        background-color: #383838; /* Cor da barra superior */
        color: #F8F8F2; /* Cor do texto da barra superior */
        font-size: 0.8em;
        padding: 0.5em 1em;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }
      .copy-code {
        background-color: #4CAF50; /* Cor de fundo do botão */
        border: none;
        color: white;
        padding: 10px 20px;
        text-align: center;
        text-decoration: none;
        display: block;
        font-size: 16px;
        margin: 0;
        cursor: pointer;
        position: absolute;
        top: 0;
        right: 0;
      }
    </style>
  </head>
  <body>
    <pre>
      <code>
        // Seu código aqui
      </code>
      <button class="copy-code">Copiar código</button>
    </pre>
    <script>
      const copyCodeBtns = document.querySelectorAll('.copy-code');
      copyCodeBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          const code = btn.previousElementSibling.textContent.trim(); // Seleciona o código do elemento irmão anterior
          navigator.clipboard.writeText(code); // Copia o código para a área de transferência
          alert('Código copiado com sucesso!'); // Exibe uma mensagem de sucesso
        });
      });
    </script>
  </body>
</html>
